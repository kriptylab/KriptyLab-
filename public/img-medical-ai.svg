<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1C1C1E"/>

  <!-- Grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.06)"/>
  </pattern>
  <rect width="800" height="450" fill="url(#dots)"/>

  <!-- Circuit lines -->
  <g stroke="#007AFF" stroke-width="1.5" fill="none" opacity="0.5">
    <polyline points="80,225 160,225 160,160 280,160 280,225 400,225"/>
    <polyline points="400,225 520,225 520,290 640,290 640,225 720,225"/>
    <polyline points="160,160 160,100 240,100"/>
    <polyline points="520,290 520,350 600,350"/>
    <polyline points="280,225 280,310 360,310"/>
  </g>

  <!-- Nodes -->
  <g fill="#007AFF" opacity="0.9">
    <circle cx="160" cy="225" r="5"/>
    <circle cx="280" cy="225" r="5"/>
    <circle cx="400" cy="225" r="7"/>
    <circle cx="520" cy="225" r="5"/>
    <circle cx="640" cy="225" r="5"/>
    <circle cx="160" cy="160" r="4"/>
    <circle cx="280" cy="160" r="4"/>
    <circle cx="520" cy="290" r="4"/>
    <circle cx="640" cy="290" r="4"/>
  </g>

  <!-- Pulse line (ECG) -->
  <polyline points="50,340 130,340 155,340 165,300 180,380 195,300 210,380 225,340 760,340"
    stroke="#5AC8FA" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Central glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="40%">
    <stop offset="0%" stop-color="#007AFF" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#007AFF" stop-opacity="0"/>
  </radialGradient>
  <rect width="800" height="450" fill="url(#glow)"/>

  <!-- Cross / medical icon -->
  <g fill="none" stroke="#007AFF" stroke-width="2.5" opacity="0.7" transform="translate(368,193)">
    <rect x="10" y="0" width="14" height="34" rx="3"/>
    <rect x="0" y="10" width="34" height="14" rx="3"/>
  </g>
</svg>
