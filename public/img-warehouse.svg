<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1C1C1E"/>

  <!-- Grid dots -->
  <pattern id="dots2" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.06)"/>
  </pattern>
  <rect width="800" height="450" fill="url(#dots2)"/>

  <!-- Central glow -->
  <radialGradient id="glow2" cx="50%" cy="50%" r="45%">
    <stop offset="0%" stop-color="#34AADC" stop-opacity="0.10"/>
    <stop offset="100%" stop-color="#34AADC" stop-opacity="0"/>
  </radialGradient>
  <rect width="800" height="450" fill="url(#glow2)"/>

  <!-- Grid lines -->
  <g stroke="rgba(52,170,220,0.15)" stroke-width="1" fill="none">
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
  </g>

  <!-- Packages -->
  <g fill="none" stroke="#34AADC" stroke-width="2" opacity="0.7">
    <!-- pkg 1 -->
    <rect x="130" y="155" width="60" height="60" rx="6"/>
    <line x1="130" y1="185" x2="190" y2="185"/>
    <line x1="160" y1="155" x2="160" y2="215"/>
    <!-- pkg 2 -->
    <rect x="370" y="135" width="70" height="70" rx="6"/>
    <line x1="370" y1="170" x2="440" y2="170"/>
    <line x1="405" y1="135" x2="405" y2="205"/>
    <!-- pkg 3 -->
    <rect x="600" y="158" width="56" height="56" rx="6"/>
    <line x1="600" y1="186" x2="656" y2="186"/>
    <line x1="628" y1="158" x2="628" y2="214"/>
  </g>

  <!-- Arrows (flow) -->
  <g stroke="#34AADC" stroke-width="2" fill="none" opacity="0.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- left to center -->
    <line x1="200" y1="185" x2="360" y2="170"/>
    <polyline points="345,162 360,170 345,178"/>
    <!-- center to right -->
    <line x1="450" y1="170" x2="590" y2="182"/>
    <polyline points="575,174 590,182 577,190"/>
  </g>

  <!-- Speed lines bottom -->
  <g stroke="rgba(52,170,220,0.25)" stroke-width="1.5" stroke-linecap="round">
    <line x1="100" y1="340" x2="300" y2="340"/>
    <line x1="120" y1="358" x2="280" y2="358"/>
    <line x1="500" y1="340" x2="700" y2="340"/>
    <line x1="520" y1="358" x2="680" y2="358"/>
  </g>
</svg>
